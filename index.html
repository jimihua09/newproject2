<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>生命倒计时 · 珍惜当下</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg-dark:#0a0e27;
  --bg-mid:#12163a;
  --gold:#f0c040;
  --gold-dim:#b8942a;
  --urgent:#ff6b6b;
  --card-bg:rgba(255,255,255,0.04);
  --card-border:rgba(255,255,255,0.07);
  --text:#e8e6f0;
  --text-dim:rgba(232,230,240,0.55);
  --radius:16px;
  --font:'PingFang SC','Microsoft YaHei','Noto Sans SC',system-ui,-apple-system,sans-serif;
}
body{
  font-family:var(--font);
  background:var(--bg-dark);
  color:var(--text);
  min-height:100vh;
  overflow-x:hidden;
  line-height:1.6;
}
#particleCanvas{
  position:fixed;top:0;left:0;width:100%;height:100%;
  pointer-events:none;z-index:0;
}

/* ──── main ──── */
main{
  position:relative;z-index:1;
  max-width:780px;margin:0 auto;padding:40px 24px 60px;
}

/* ──── header ──── */
.site-header{
  text-align:center;padding:40px 0 20px;
  opacity:0;animation:fadeIn 1s 0.2s forwards;
}
.site-header h1{
  font-size:clamp(28px,6vw,48px);font-weight:800;
  background:linear-gradient(135deg,#f0c040,#ff8a5c);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;letter-spacing:2px;
}
.site-header p{
  color:var(--text-dim);font-size:clamp(14px,2.5vw,18px);margin-top:8px;
}

/* ──── quote ──── */
.quote-bar{
  text-align:center;padding:12px 0 28px;opacity:0;
  animation:fadeIn 1s 0.4s forwards;
}
.quote-bar blockquote{
  font-size:clamp(13px,2vw,17px);color:var(--text-dim);
  font-style:italic;max-width:580px;margin:0 auto;
  border-left:2px solid var(--gold);padding-left:18px;
  transition:opacity 0.8s;
}

/* ──── input section ──── */
#inputSection{
  background:var(--card-bg);backdrop-filter:blur(12px);
  border:1px solid var(--card-border);
  border-radius:var(--radius);padding:36px 32px;
  opacity:0;animation:fadeIn 0.8s 0.5s forwards;
  transition:opacity 0.6s,transform 0.6s;
}
#inputSection.hidden{opacity:0;transform:translateY(20px);pointer-events:none;max-height:0;overflow:hidden;padding:0 32px;margin:0;border:0;}
.input-row{display:flex;gap:20px;flex-wrap:wrap;}
.input-group{flex:1;min-width:200px;}
.input-group label{display:block;font-size:14px;color:var(--text-dim);margin-bottom:6px;font-weight:500;}
 .date-selectors{display:flex;gap:8px;}
 .date-selectors select{
   flex:1;padding:12px 4px;border-radius:10px;
   border:1px solid var(--card-border);
   background:#1a1e42;
   color:var(--text);font-size:16px;font-family:var(--font);
   outline:none;transition:border-color 0.3s;
   cursor:pointer;
   -webkit-appearance:none;appearance:none;
 }
 .date-selectors select:focus{border-color:var(--gold);}
 .date-selectors select option{background:#1a1e42;color:var(--text);}
.input-group input[type="range"]{
  width:100%;margin-top:6px;
  -webkit-appearance:none;appearance:none;
  height:4px;border-radius:2px;background:rgba(255,255,255,0.15);
  outline:none;
}
.input-group input[type="range"]::-webkit-slider-thumb{
  -webkit-appearance:none;appearance:none;
  width:20px;height:20px;border-radius:50%;
  background:var(--gold);cursor:pointer;
  box-shadow:0 0 12px rgba(240,192,64,0.4);
}
#lifeSpanValue{color:var(--gold);font-weight:700;}
.btn-start{
  display:block;width:100%;margin-top:24px;
  padding:14px;border:none;border-radius:12px;
  background:linear-gradient(135deg,var(--gold),var(--gold-dim));
  color:#0a0e27;font-size:17px;font-weight:700;
  font-family:var(--font);cursor:pointer;
  transition:transform 0.2s,box-shadow 0.3s;
  letter-spacing:1px;
}
.btn-start:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(240,192,64,0.3);}
.btn-start:active{transform:translateY(0);}

/* ──── result section ──── */
#resultSection{
  display:none;margin-top:20px;
  opacity:0;transition:opacity 0.8s;
}
#resultSection.visible{display:block;opacity:1;}

/* ──── countdown ──── */
.countdown-card{
  background:var(--card-bg);backdrop-filter:blur(12px);
  border:1px solid var(--card-border);
  border-radius:var(--radius);padding:32px 24px;
  text-align:center;position:relative;overflow:hidden;
}
.countdown-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
}
.countdown-label{font-size:14px;color:var(--text-dim);margin-bottom:16px;letter-spacing:2px;}
.countdown-main{
  display:flex;justify-content:center;align-items:baseline;
  gap:clamp(4px,1.5vw,16px);flex-wrap:wrap;
}
.countdown-item{display:flex;flex-direction:column;align-items:center;}
.countdown-item .num{
  font-size:clamp(32px,8vw,72px);font-weight:800;
  background:linear-gradient(180deg,#fff 40%,var(--gold));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;line-height:1;font-variant-numeric:tabular-nums;
  transition:all 0.3s;
}
.countdown-item .lbl{font-size:12px;color:var(--text-dim);margin-top:4px;}
.countdown-sep{font-size:clamp(20px,5vw,44px);color:var(--text-dim);font-weight:200;margin:0 2px;}

/* ──── progress ring ──── */
.progress-section{margin-top:20px;display:flex;align-items:center;gap:24px;flex-wrap:wrap;justify-content:center;}
.progress-ring-wrap{position:relative;width:140px;height:140px;flex-shrink:0;}
.progress-ring-wrap svg{transform:rotate(-90deg);width:100%;height:100%;}
.progress-ring-bg{fill:none;stroke:rgba(255,255,255,0.08);stroke-width:8;}
.progress-ring-fill{fill:none;stroke:url(#ringGrad);stroke-width:8;stroke-linecap:round;
  transition:stroke-dashoffset 1s ease;}
.progress-center{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  text-align:center;
}
.progress-center .pct{font-size:28px;font-weight:800;color:var(--gold);}
.progress-center .pct-lbl{font-size:12px;color:var(--text-dim);}
.progress-text{flex:1;min-width:160px;}
.progress-text .stat-row{display:flex;justify-content:space-between;padding:6px 0;font-size:14px;border-bottom:1px solid rgba(255,255,255,0.05);}
.progress-text .stat-row .val{font-weight:600;color:var(--gold);}
.progress-text .stat-row .val.warn{color:var(--urgent);}

/* ──── metrics ──── */
.metrics-grid{margin-top:24px;display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;}
.metric-card{
  background:var(--card-bg);backdrop-filter:blur(8px);
  border:1px solid var(--card-border);
  border-radius:14px;padding:20px 18px;
  text-align:center;transition:transform 0.3s,box-shadow 0.3s;
  opacity:0;transform:translateY(20px);
}
.metric-card.animate-in{animation:cardIn 0.5s forwards;}
.metric-card:hover{transform:translateY(-4px);box-shadow:0 12px 40px rgba(0,0,0,0.3);}
.metric-card .icon{font-size:32px;margin-bottom:6px;}
.metric-card .value{
  font-size:clamp(24px,4vw,36px);font-weight:800;
  color:var(--gold);line-height:1.2;
  font-variant-numeric:tabular-nums;
}
.metric-card .desc{font-size:13px;color:var(--text-dim);margin-top:4px;}
.metric-card .sub{font-size:11px;color:rgba(232,230,240,0.3);margin-top:2px;}

/* ──── footer ──── */
.site-footer{text-align:center;padding:40px 0 20px;opacity:0;animation:fadeIn 1s 1s forwards;}
.site-footer p{font-size:14px;color:var(--text-dim);line-height:1.8;}
.site-footer .highlight{color:var(--gold);font-weight:600;}

/* ──── animations ──── */
@keyframes fadeIn{to{opacity:1}}
@keyframes cardIn{
  to{opacity:1;transform:translateY(0)}
}
@keyframes twinkle{
  0%,100%{opacity:0.3}
  50%{opacity:1}
}
@keyframes pulse{
  0%,100%{box-shadow:0 0 12px rgba(240,192,64,0.2)}
  50%{box-shadow:0 0 28px rgba(240,192,64,0.5)}
}
.countdown-card.active{animation:pulse 3s infinite;}

/* ──── responsive ──── */
@media(max-width:540px){
  main{padding:24px 16px 40px;}
  #inputSection{padding:24px 18px;}
  .input-row{flex-direction:column;}
  .countdown-main{gap:6px;}
  .progress-section{flex-direction:column;text-align:center;}
  .metrics-grid{grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;}
  .metric-card{padding:16px 12px;}
}
</style>
</head>
<body>

<canvas id="particleCanvas"></canvas>

<main>
  <header class="site-header">
    <h1>⏳ 你的生命还剩多少？</h1>
    <p>在时间的长河里，看清当下的重量</p>
  </header>

  <div class="quote-bar">
    <blockquote id="quoteText">"生命如同沙漏，我们总以为还有很多，但每一粒沙落下都不会回头。"</blockquote>
  </div>

  <!-- ──── input ──── -->
  <section id="inputSection">
    <div class="input-row">
      <div class="input-group">
        <label>📅 出生日期</label>
        <div class="date-selectors">
          <select id="birthYear"></select>
          <select id="birthMonth"></select>
          <select id="birthDay"></select>
        </div>
      </div>
      <div class="input-group">
        <label>🎯 预期寿命：<span id="lifeSpanValue">80</span> 岁</label>
        <input type="range" id="lifeExpectancy" min="50" max="120" value="80">
      </div>
    </div>
    <button class="btn-start" id="startBtn">✨ 看看我还剩多少时间</button>
  </section>

  <!-- ──── result ──── -->
  <section id="resultSection">
    <div class="countdown-card" id="countdownCard">
      <div class="countdown-label">⏱ 你的生命倒计时</div>
      <div class="countdown-main" id="countdownDisplay">
        <div class="countdown-item"><span class="num" id="cdYears">0</span><span class="lbl">年</span></div>
        <span class="countdown-sep">·</span>
        <div class="countdown-item"><span class="num" id="cdMonths">0</span><span class="lbl">月</span></div>
        <span class="countdown-sep">·</span>
        <div class="countdown-item"><span class="num" id="cdDays">0</span><span class="lbl">天</span></div>
        <span class="countdown-sep">·</span>
        <div class="countdown-item"><span class="num" id="cdHours">00</span><span class="lbl">时</span></div>
        <span class="countdown-sep">∶</span>
        <div class="countdown-item"><span class="num" id="cdMinutes">00</span><span class="lbl">分</span></div>
        <span class="countdown-sep">∶</span>
        <div class="countdown-item"><span class="num" id="cdSeconds">00</span><span class="lbl">秒</span></div>
      </div>
    </div>

    <!-- progress -->
    <div class="progress-section" id="progressSection">
      <div class="progress-ring-wrap">
        <svg viewBox="0 0 140 140">
          <defs>
            <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#f0c040"/>
              <stop offset="100%" stop-color="#ff8a5c"/>
            </linearGradient>
          </defs>
          <circle class="progress-ring-bg" cx="70" cy="70" r="58"/>
          <circle class="progress-ring-fill" id="progressRing" cx="70" cy="70" r="58"
            stroke-dasharray="364.4" stroke-dashoffset="0"/>
        </svg>
        <div class="progress-center">
          <div class="pct" id="usedPct">0%</div>
          <div class="pct-lbl">已度过</div>
        </div>
      </div>
      <div class="progress-text">
        <div class="stat-row"><span>📅 已活</span><span class="val" id="statLived">0 天</span></div>
        <div class="stat-row"><span>⏳ 还剩</span><span class="val" id="statRemain">0 天</span></div>
        <div class="stat-row"><span>🎂 生日那天</span><span class="val" id="statBirthday">-</span></div>
      </div>
    </div>

    <!-- metrics -->
    <div class="metrics-grid" id="metricsGrid"></div>
  </section>

  <footer class="site-footer">
    <p>每一秒都是你生命中最年轻的一秒。<br>
    <span class="highlight">别等明天，就现在，去热烈地活着。</span></p>
  </footer>
</main>

<script>
// ============================================================
//  QUOTES
// ============================================================
const QUOTES = [
  '"生命如同沙漏，我们总以为还有很多，但每一粒沙落下都不会回头。"',
  '"你浪费的今天，是昨天死去的人奢望的明天。"',
  '"不要等待，因为时机永远不会"刚好"。从现在开始，做你想做的事。"',
  '"生命不在于呼吸的次数，而在于那些令你屏息的时刻。"',
  '"每一天都是一份礼物，这就是为什么它被称为"当下"。"',
  '"最大的浪费不是金钱，而是时间。它不可再生，不可逆转。"',
  '"人生最大的遗憾，不是我做不到，而是我本可以。"',
  '"种一棵树最好的时间是十年前，其次是现在。"',
  '"只有把握当下，才能不负此生。"',
  '"活着不是为了等待风暴过去，而是学会在雨中起舞。"',
];
const quoteEl = document.getElementById('quoteText');
let quoteIdx = 0;
setInterval(()=>{
  quoteIdx=(quoteIdx+1)%QUOTES.length;
  quoteEl.style.opacity=0;
  setTimeout(()=>{quoteEl.textContent=QUOTES[quoteIdx];quoteEl.style.opacity=1;},400);
},6000);

// ============================================================
//  PARTICLES
// ============================================================
const canvas = document.getElementById('particleCanvas');
const ctx = canvas.getContext('2d');
let W,H;

function resizeCanvas(){
  W=canvas.width=window.innerWidth;
  H=canvas.height=window.innerHeight;
}
window.addEventListener('resize',resizeCanvas);
resizeCanvas();

class SandParticle{
  constructor(){this.reset();}
  reset(){
    this.x=Math.random()*W;
    this.y=-10;
    this.size=1.5+Math.random()*2.5;
    this.speedY=0.3+Math.random()*0.8;
    this.speedX=(Math.random()-0.5)*0.3;
    this.opacity=0.2+Math.random()*0.5;
    this.hue=38+Math.random()*15;
  }
  update(){
    this.y+=this.speedY;
    this.x+=this.speedX;
    if(this.y>H+10) this.reset();
  }
  draw(){
    ctx.beginPath();
    ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
    ctx.fillStyle=`hsla(${this.hue},80%,60%,${this.opacity})`;
    ctx.fill();
  }
}

class StarParticle{
  constructor(){this.reset(true);}
  reset(init=false){
    this.x=Math.random()*W;
    this.y=Math.random()*H;
    this.size=0.5+Math.random()*1.5;
    this.twinkleSpeed=0.005+Math.random()*0.02;
    this.twinklePhase=Math.random()*Math.PI*2;
    this.baseOpacity=0.1+Math.random()*0.4;
  }
  update(){
    this.twinklePhase+=this.twinkleSpeed;
  }
  draw(){
    const o=this.baseOpacity*(0.5+0.5*Math.sin(this.twinklePhase));
    ctx.beginPath();
    ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
    ctx.fillStyle=`rgba(255,255,255,${o})`;
    ctx.fill();
  }
}

const sands=[];
const stars=[];
for(let i=0;i<80;i++) sands.push(new SandParticle());
for(let i=0;i<60;i++) stars.push(new StarParticle());

let runningAnims=false;

function animateParticles(){
  ctx.clearRect(0,0,W,H);
  stars.forEach(s=>{s.update();s.draw();});
  sands.forEach(s=>{s.update();s.draw();});
  if(runningAnims) requestAnimationFrame(animateParticles);
}
animateParticles();

// ============================================================
//  STATE
// ============================================================
let lifeData = null;
let timerInterval = null;

const DEFAULT_LIFE = 80;
 const birthYear = document.getElementById('birthYear');
 const birthMonth = document.getElementById('birthMonth');
 const birthDay = document.getElementById('birthDay');
 const lifeSpanSlider = document.getElementById('lifeExpectancy');
 const lifeSpanValue = document.getElementById('lifeSpanValue');

 // 填充年月日下拉框并设置默认值
 const curYear = new Date().getFullYear();
 for(let y = curYear; y >= 1950; y--){
   const opt = document.createElement('option');
   opt.value = y; opt.textContent = y + '年';
   birthYear.appendChild(opt);
 }
 for(let m = 1; m <= 12; m++){
   const opt = document.createElement('option');
   opt.value = m; opt.textContent = m + '月';
   birthMonth.appendChild(opt);
 }
 for(let d = 1; d <= 31; d++){
   const opt = document.createElement('option');
   opt.value = d; opt.textContent = d + '日';
   birthDay.appendChild(opt);
 }
 const defaultDate = new Date();
 defaultDate.setFullYear(defaultDate.getFullYear() - 20);
 birthYear.value = defaultDate.getFullYear();
 birthMonth.value = defaultDate.getMonth() + 1;
 birthDay.value = defaultDate.getDate();
lifeSpanSlider.addEventListener('input',()=>{
  lifeSpanValue.textContent = lifeSpanSlider.value;
});

// ============================================================
//  CALCULATIONS
// ============================================================
function calcLife(birthDate, lifeYears){
  const now = new Date();
  const birth = new Date(birthDate);
  if(isNaN(birth.getTime())) return null;

  const ageMs = now - birth;
  const totalMs = lifeYears * 365.25 * 86400000;
  const remainingMs = Math.max(0, totalMs - ageMs);
  const remainingDays = remainingMs / 86400000;
  const ageDays = ageMs / 86400000;
  const usedPct = Math.min(100, (ageMs / totalMs) * 100);

  // Breakdown
  const years = Math.floor(remainingDays / 365.25);
  const months = Math.floor((remainingDays % 365.25) / 30.44);
  const days = Math.floor(remainingDays % 30.44);
  const hrs = Math.floor((remainingMs % 86400000) / 3600000);
  const mins = Math.floor((remainingMs % 3600000) / 60000);
  const secs = Math.floor((remainingMs % 60000) / 1000);

  // Next birthday
  const nextBday = new Date(now.getFullYear(), birth.getMonth(), birth.getDate());
  if(nextBday < now) nextBday.setFullYear(nextBday.getFullYear()+1);
  const daysToBday = Math.ceil((nextBday - now) / 86400000);

  return {
    years, months, days, hrs, mins, secs,
    remainingDays: Math.floor(remainingDays),
    remainingMs,
    ageDays: Math.floor(ageDays),
    ageYears: Math.floor(ageMs / (365.25*86400000)),
    usedPct: Math.min(100, usedPct),
    isOverage: ageMs >= totalMs,
    lifeYears,
    daysToBday
  };
}

function getMetrics(data){
  if(!data || data.isOverage) return [];
  const d = data.remainingDays;
  const y = d / 365.25;
  return [
    {icon:'😴',value:fmtNum(d),desc:'安睡的夜晚',sub:`相当于 ${(d*8/24).toFixed(0)} 天在美梦中`},
    {icon:'🍜',value:fmtNum(d*3),desc:'品尝美食的机会',sub:'一日三餐，每一餐都是礼物'},
    {icon:'✈️',value:(y*2).toFixed(1),desc:'周逍遥假期',sub:'每年2周，尽情去探索世界'},
    {icon:'📚',value:fmtNum(Math.floor(d/30)),desc:'本启迪心灵的书籍',sub:'每月一本，丰富你的思想'},
    {icon:'🌅',value:fmtNum(d),desc:'次日出与日落',sub:'每一次都独一无二'},
    {icon:'💓',value:fmtNum(Math.floor(d*86400*70)),desc:'次心跳',sub:'每一次都在提醒你活着'},
    {icon:'🤗',value:fmtNum(d),desc:'次温暖的拥抱',sub:'每天一次，传递爱与温度'},
    {icon:'😂',value:fmtNum(d*15),desc:'次开怀大笑',sub:'每天至少笑15次'},
    {icon:'🌍',value:(y/2).toFixed(1),desc:'次环游世界',sub:'用脚步丈量这个星球'},
    {icon:'☕',value:fmtNum(d*2),desc:'杯悠闲的咖啡',sub:'每天两杯，品味生活的醇香'},
  ];
}

function fmtNum(n){
  if(n>999999) return (n/10000).toFixed(0)+'万';
  return n.toLocaleString();
}

// ============================================================
//  RENDER
// ============================================================
function pad(n){return n.toString().padStart(2,'0')}

function updateDisplay(data){
  if(!data) return;
  const isOverage = data.isOverage;

  document.getElementById('cdYears').textContent = isOverage ? '∞' : data.years;
  document.getElementById('cdMonths').textContent = isOverage ? '∞' : data.months;
  document.getElementById('cdDays').textContent = isOverage ? '∞' : data.days;
  document.getElementById('cdHours').textContent = isOverage ? '∞' : pad(data.hrs);
  document.getElementById('cdMinutes').textContent = isOverage ? '∞' : pad(data.mins);
  document.getElementById('cdSeconds').textContent = isOverage ? '∞' : pad(data.secs);

  // Progress ring
  const circumference = 364.4;
  const offset = circumference * (1 - data.usedPct / 100);
  document.getElementById('progressRing').style.strokeDashoffset = offset;
  document.getElementById('usedPct').textContent = isOverage ? '∞' : data.usedPct.toFixed(1)+'%';

  document.getElementById('statLived').textContent = fmtNum(data.ageDays)+' 天';
  document.getElementById('statRemain').textContent = isOverage ? '🎉 每一天都是赚到的！' : fmtNum(data.remainingDays)+' 天';
  document.getElementById('statBirthday').textContent = isOverage ? '-' : data.daysToBday+' 天后';

  // Metrics
  const grid = document.getElementById('metricsGrid');
  if(!grid.dataset.initialized){
    grid.innerHTML = '';
    const metrics = getMetrics(data);
    metrics.forEach((m,i)=>{
      const card = document.createElement('div');
      card.className = 'metric-card';
      card.dataset.idx = i;
      card.innerHTML = `
        <div class="icon">${m.icon}</div>
        <div class="value" data-type="metric-val">${m.value}</div>
        <div class="desc">${m.desc}</div>
        <div class="sub">${m.sub}</div>
      `;
      grid.appendChild(card);
      setTimeout(()=>card.classList.add('animate-in'), i*80);
    });
    grid.dataset.initialized = '1';
  }

  // overage style
  const card = document.getElementById('countdownCard');
  if(isOverage){
    card.classList.remove('active');
    document.getElementById('countdownDisplay').innerHTML = `
      <div style="font-size:clamp(18px,4vw,32px);color:var(--gold);padding:20px 0;">
        🎉 你已经超越了平均寿命！<br>
        <span style="font-size:0.7em;color:var(--text-dim);">已多活了 ${data.remainingDays < 0 ? fmtNum(Math.floor(Math.abs(data.remainingDays))) : 0} 天<br>
        每一天都是命运的馈赠，请热烈地活着！</span>
      </div>
    `;
  } else {
    card.classList.add('active');
  }
}

// ============================================================
//  MAIN LOOP
// ============================================================
function tick(){
  if(!lifeData) return;
   const now = calcLife(birthYear.value+'-'+String(birthMonth.value).padStart(2,'0')+'-'+String(birthDay.value).padStart(2,'0'), lifeData.lifeYears);
  if(now) updateDisplay(now);
}

function startCountdown(){
   const val = birthYear.value+'-'+String(birthMonth.value).padStart(2,'0')+'-'+String(birthDay.value).padStart(2,'0');
  if(!val){ alert('请先输入你的出生日期 🙏'); return; }

  const life = calcLife(val, parseFloat(lifeSpanSlider.value));
  if(!life){ alert('请输入有效的出生日期 🙏'); return; }

  lifeData = life;
  runningAnims = true;
  animateParticles();

  // transition
  document.getElementById('inputSection').classList.add('hidden');
  const resultSec = document.getElementById('resultSection');
  resultSec.style.display = 'block';
  setTimeout(()=>resultSec.classList.add('visible'), 50);

  // initial render
  tick();

  // timer
  if(timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(tick, 1000);
}

document.getElementById('startBtn').addEventListener('click', startCountdown);
 function onEnter(e){if(e.key==='Enter') startCountdown();}
 birthYear.addEventListener('keydown', onEnter);
 birthMonth.addEventListener('keydown', onEnter);
 birthDay.addEventListener('keydown', onEnter);

// ============================================================
//  INIT - show example on load
// ============================================================
setTimeout(()=>{quoteEl.style.opacity=1;},500);
</script>
